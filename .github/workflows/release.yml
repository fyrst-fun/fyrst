name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build contracts
        run: |
          cd contracts
          cargo build --release
      - name: Build SDK
        run: |
          cd sdk
          npm ci
          npm run build
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
